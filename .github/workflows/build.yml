name: Rebuild dashboard

on:
  push:
    branches: [main]
    paths:
      - "data/ForUpload_ProductRoadmapData.xlsx"
      - "build_dashboard.py"
      - "template.html"
  workflow_dispatch: {}   # lets you trigger a rebuild manually from the Actions tab

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build dashboard
        run: python build_dashboard.py

      - name: Commit rebuilt dashboard
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Rebuild dashboard from updated spreadsheet"
          file_pattern: docs/index.html
